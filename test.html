<!DOCTYPE html>
<html>
<body>
    <h2>Real-Time Chat App</h2>
    <input id="room" placeholder="Room ID" value="room1">
    <input id="username" placeholder="Your name">
    <button onclick="connect()">Join Room</button>
    <br><br>
    <div id="online"></div>
    <br>
    <div id="chat" style="border:1px solid #ccc; height:300px; overflow-y:scroll; padding:10px;"></div>
    <br>
    <input id="message" placeholder="Type a message" style="width:300px">
    <button onclick="sendMessage()">Send</button>

    <script>
        let ws;
        let username;

        function connect() {
            document.getElementById("chat").innerHTML = "";
            const room = document.getElementById("room").value;
            username = document.getElementById("username").value;
            ws = new WebSocket(`ws://127.0.0.1:8000/ws/${room}?email=${username}`);
            ws.onmessage = (event) => {
                const chat = document.getElementById("chat");
                chat.innerHTML += `<p>${event.data}</p>`;
                chat.scrollTop = chat.scrollHeight;
            };
            ws.onopen = () => {
                document.getElementById("online").innerHTML = `Connected to ${room} as ${username}`;
            };
        }

        function sendMessage() {
            const message = document.getElementById("message").value;
            ws.send(message);
            document.getElementById("message").value = "";
        }
    </script>
</body>
</html>
